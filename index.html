<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sir Shotto App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
:root{
    --bg:#050816;
    --card:rgba(255,255,255,.09);
    --line:rgba(255,255,255,.14);
    --text:#fff;
    --muted:#9ca3af;
    --green:#00e676;
    --cyan:#00c8ff;
    --pink:#ff4ecd;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left,rgba(0,230,118,.16),transparent 35%),
        radial-gradient(circle at top right,rgba(255,78,205,.15),transparent 35%),
        linear-gradient(145deg,#020617,#050816);
    padding-bottom:82px;
}

.app{
    max-width:540px;
    margin:auto;
    min-height:100vh;
}

.header{
    position:sticky;
    top:0;
    z-index:1000;
    background:rgba(5,8,22,.97);
    backdrop-filter:blur(18px);
    border-bottom:1px solid var(--line);
    padding:10px 12px 12px;
}

.brand-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
}

.logo{
    width:42px;
    height:42px;
    border-radius:15px;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,var(--green),var(--cyan));
    color:white;
    flex:0 0 auto;
}

.brand-title{
    min-width:0;
}

.brand-title strong{
    display:block;
    font-size:15px;
    font-weight:950;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.brand-title small{
    display:block;
    color:var(--muted);
    font-size:11px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.header-icons{
    display:flex;
    gap:7px;
    flex:0 0 auto;
}

.icon-btn{
    width:39px;
    height:39px;
    border-radius:50%;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:white;
    display:grid;
    place-items:center;
}

.icon-btn.active{
    background:linear-gradient(135deg,var(--green),var(--cyan));
    border-color:transparent;
    box-shadow:0 0 18px rgba(0,230,118,.38);
}

.search-area{
    display:grid;
    grid-template-columns:1fr 43px;
    gap:8px;
}

.form-control,
.form-select,
textarea{
    background:rgba(255,255,255,.09)!important;
    border:1px solid var(--line)!important;
    color:white!important;
    border-radius:16px!important;
}

.form-control::placeholder,
textarea::placeholder{
    color:#9ca3af;
}

.form-select option{
    color:#111827!important;
    background:#fff!important;
    font-weight:700;
}

.search-results-top{
    display:none;
    margin-top:10px;
    max-height:235px;
    overflow-y:auto;
    border-radius:20px;
    background:rgba(8,17,31,.98);
    border:1px solid var(--line);
    padding:8px;
}

.search-results-top.show{
    display:block;
}

.content{
    padding:12px;
}

.player-card{
    border-radius:30px;
    background:
        radial-gradient(circle at top left,rgba(0,230,118,.14),transparent 45%),
        radial-gradient(circle at bottom right,rgba(255,78,205,.18),transparent 45%),
        var(--card);
    border:1px solid var(--line);
    padding:14px;
    box-shadow:0 22px 55px rgba(0,0,0,.35);
}

.stage{
    height:292px;
    border-radius:27px;
    background:
        linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.04)),
        radial-gradient(circle at center,rgba(0,230,118,.12),transparent 58%);
    border:1px solid rgba(255,255,255,.13);
    overflow:hidden;
    position:relative;
    display:grid;
    place-items:center;
    margin-bottom:12px;
}

.view-tools{
    position:absolute;
    top:10px;
    right:10px;
    z-index:50;
    display:flex;
    gap:8px;
}

.view-btn{
    min-width:39px;
    height:35px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.36);
    color:#fff;
    display:grid;
    place-items:center;
    font-weight:950;
    font-size:12px;
    backdrop-filter:blur(8px);
}

.view-btn.active{
    background:linear-gradient(135deg,var(--green),var(--cyan));
    border-color:transparent;
}

.youtube-frame,
.video-player{
    display:none;
    width:100%;
    height:100%;
    border:0;
    background:#000;
}

.disc-area{
    width:min(230px,74vw);
    aspect-ratio:1/1;
    position:relative;
    display:grid;
    place-items:center;
}

.disc{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;
    background:
        radial-gradient(circle at center,#fff 0 7%,#111827 8% 15%,#020617 16% 25%,#334155 26% 28%,#020617 29% 100%);
    box-shadow:inset 0 0 18px rgba(255,255,255,.12),0 24px 50px rgba(0,0,0,.48);
    animation:spin 7s linear infinite;
    animation-play-state:paused;
}

.disc.playing{
    animation-play-state:running;
}

.disc::after{
    content:"";
    position:absolute;
    inset:36%;
    border-radius:50%;
    background:linear-gradient(135deg,var(--green),var(--cyan),var(--pink));
}

.tone-arm{
    position:absolute;
    right:-30px;
    top:28px;
    width:115px;
    height:12px;
    border-radius:999px;
    background:linear-gradient(90deg,#e5e7eb,#94a3b8);
    transform-origin:right center;
    transform:rotate(-24deg);
    transition:.3s;
}

.tone-arm.playing{
    transform:rotate(-8deg);
}

.waves{
    position:absolute;
    left:20px;
    right:20px;
    bottom:16px;
    display:flex;
    justify-content:center;
    align-items:end;
    gap:5px;
    height:38px;
    opacity:.45;
}

.bar{
    width:6px;
    height:8px;
    border-radius:999px;
    background:linear-gradient(var(--green),var(--cyan));
    animation:wave .9s ease-in-out infinite;
    animation-play-state:paused;
}

.waves.playing .bar{
    animation-play-state:running;
}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}
.bar:nth-child(6){animation-delay:.2s}
.bar:nth-child(7){animation-delay:.1s}

@keyframes spin{
    to{transform:rotate(360deg)}
}

@keyframes wave{
    0%,100%{height:8px}
    50%{height:34px}
}

.lyrics-popup{
    position:absolute;
    left:12px;
    right:12px;
    bottom:12px;
    z-index:40;
    min-height:72px;
    max-height:112px;
    border-radius:22px;
    background:rgba(0,0,0,.38);
    border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(10px);
    display:none;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    padding:10px;
    overflow:hidden;
}

.lyrics-popup.show{
    display:flex;
}

.subtitle-line{
    max-width:96%;
    margin-top:4px;
    padding:7px 12px;
    border-radius:999px;
    background:rgba(0,0,0,.38);
    color:white;
    font-size:14px;
    font-weight:850;
    text-align:center;
    line-height:1.35;
    text-shadow:0 2px 5px rgba(0,0,0,.7);
}

.subtitle-word{
    display:inline-block;
    margin:1px 2px;
    animation:wordPop .18s ease-out;
}

@keyframes wordPop{
    from{transform:translateY(8px) scale(.92);opacity:0}
    to{transform:translateY(0) scale(1);opacity:1}
}

.song-title{
    font-size:1.15rem;
    font-weight:950;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-bottom:2px;
}

.song-artist{
    color:var(--muted);
    font-size:13px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-bottom:8px;
}

.time-row{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--muted);
    margin-bottom:4px;
}

input[type=range]{
    width:100%;
    accent-color:var(--green);
}

.controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:13px;
    margin-top:10px;
}

.control-sm{
    width:43px;
    height:43px;
    border-radius:50%;
    border:1px solid var(--line);
    background:rgba(255,255,255,.09);
    color:white;
    display:grid;
    place-items:center;
}

.control-main{
    width:64px;
    height:64px;
    border-radius:50%;
    border:0;
    background:linear-gradient(135deg,var(--green),var(--cyan));
    color:white;
    display:grid;
    place-items:center;
    font-size:24px;
}

.quick-actions{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:12px;
}

.quick-actions button{
    border-radius:16px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:white;
    padding:9px 4px;
    font-size:10.5px;
    font-weight:850;
}

.quick-actions i{
    display:block;
    font-size:16px;
    margin-bottom:4px;
}

.list-card{
    margin-top:12px;
    border-radius:24px;
    background:var(--card);
    border:1px solid var(--line);
    padding:12px;
}

.results{
    margin-top:10px;
    max-height:420px;
    overflow-y:auto;
}

.item{
    display:grid;
    grid-template-columns:52px 1fr auto;
    gap:9px;
    align-items:center;
    padding:9px;
    border-radius:18px;
    background:rgba(255,255,255,.065);
    border:1px solid rgba(255,255,255,.09);
    margin-bottom:8px;
    cursor:pointer;
}

.item.active{
    border-color:rgba(0,230,118,.48);
    background:rgba(0,230,118,.13);
}

.thumb{
    width:52px;
    height:52px;
    border-radius:17px;
    overflow:hidden;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,var(--green),var(--pink));
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.meta{
    min-width:0;
}

.meta strong{
    display:block;
    font-size:13.5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.meta small{
    display:block;
    color:var(--muted);
    font-size:11px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.mini-round{
    width:34px;
    height:34px;
    border-radius:50%;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:white;
    display:grid;
    place-items:center;
}

.empty{
    text-align:center;
    border:1px dashed rgba(255,255,255,.22);
    border-radius:18px;
    color:var(--muted);
    padding:16px;
    font-size:13px;
}

.bottom-player{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:999;
    background:rgba(5,8,22,.96);
    backdrop-filter:blur(18px);
    border-top:1px solid var(--line);
    padding:9px 10px;
    transition:.25s ease;
}

.bottom-player.hidden-mini{
    transform:translateY(calc(100% - 24px));
}

.bottom-player.hidden-mini .bottom-inner{
    opacity:.35;
}

.bottom-handle{
    position:absolute;
    top:-17px;
    left:50%;
    transform:translateX(-50%);
    width:52px;
    height:30px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(5,8,22,.96);
    color:white;
    display:grid;
    place-items:center;
}

.bottom-inner{
    max-width:540px;
    margin:auto;
    display:grid;
    grid-template-columns:44px 1fr auto auto;
    gap:9px;
    align-items:center;
}

.bottom-thumb{
    width:44px;
    height:44px;
    border-radius:15px;
    overflow:hidden;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,var(--green),var(--cyan));
}

.bottom-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.bottom-text{
    min-width:0;
}

.bottom-text strong{
    display:block;
    font-size:13px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.bottom-text small{
    display:block;
    color:var(--muted);
    font-size:11px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.modal-content,
.offcanvas{
    background:#08111f!important;
    color:white!important;
    border-color:var(--line)!important;
}

.btn-main{
    border:0;
    border-radius:999px;
    background:linear-gradient(135deg,var(--green),var(--cyan));
    color:white;
    font-weight:900;
}

.btn-soft{
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:white;
    font-weight:850;
}

.menu-source-btn{
    width:100%;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:white;
    border-radius:18px;
    padding:12px;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
    text-align:left;
}

.menu-source-btn.active{
    background:linear-gradient(135deg,rgba(0,230,118,.35),rgba(0,200,255,.25));
    border-color:rgba(0,230,118,.45);
}

.menu-source-btn i{
    width:40px;
    height:40px;
    border-radius:14px;
    display:grid;
    place-items:center;
    background:rgba(255,255,255,.12);
}

@media(max-width:390px){
    .stage{
        height:260px;
    }

    .disc-area{
        width:min(205px,72vw);
    }

    .control-main{
        width:58px;
        height:58px;
    }

    .control-sm{
        width:40px;
        height:40px;
    }

    .item{
        grid-template-columns:46px 1fr auto;
    }

    .thumb{
        width:46px;
        height:46px;
    }

    .subtitle-line{
        font-size:12.5px;
        padding:6px 10px;
    }

    .quick-actions{
        gap:6px;
    }

    .quick-actions button{
        font-size:9.5px;
    }
}
</style>
</head>

<body>

<div class="app">

<header class="header">
    <div class="brand-row">
        <div class="brand">
            <div class="logo">
                <i class="fa-solid fa-compact-disc"></i>
            </div>
            <div class="brand-title">
                <strong>Sir Shotto App</strong>
                <small>By Fidelis Paschal Shotto</small>
            </div>
        </div>

        <div class="header-icons">
            <button class="icon-btn" data-bs-toggle="offcanvas" data-bs-target="#menuCanvas">
                <i class="fa-solid fa-bars"></i>
            </button>

            <button class="icon-btn" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="fa-solid fa-plus"></i>
            </button>

            <button class="icon-btn" data-bs-toggle="modal" data-bs-target="#soundModal">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" class="form-control" placeholder="Search music, artist, video...">
        <button class="icon-btn" onclick="searchMusic()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>

    <div id="searchResultsTop" class="search-results-top"></div>
</header>

<main class="content">

<section class="player-card" id="playerSection">
    <div class="stage">

        <div class="view-tools">
            <button id="ccBtn" class="view-btn" onclick="toggleLyricsPopup()">CC</button>
            <button class="view-btn" onclick="collapseBottomPlayer()">
                <i class="fa-solid fa-v"></i>
            </button>
        </div>

        <iframe id="youtubeFrame" class="youtube-frame"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen></iframe>

        <video id="videoPlayer" class="video-player" controls playsinline></video>

        <div class="disc-area" id="discArea">
            <div class="disc" id="disc"></div>
            <div class="tone-arm" id="toneArm"></div>
        </div>

        <div class="waves" id="waves">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="lyrics-popup" id="lyricsPopup">
            <div class="subtitle-line" id="subtitleLine1"></div>
            <div class="subtitle-line" id="subtitleLine2">Bonyeza CC kuonyesha au kuficha lyrics...</div>
        </div>
    </div>

    <div class="song-title" id="nowTitle">Chagua music</div>
    <div class="song-artist" id="nowArtist">Search, YouTube, Device Music</div>

    <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="durationTime">0:00</span>
    </div>

    <input type="range" id="progressRange" min="0" max="100" value="0">

    <div class="controls">
        <button class="control-sm" onclick="prevSong()">
            <i class="fa-solid fa-backward-step"></i>
        </button>

        <button class="control-main" id="playBtn" onclick="togglePlay()">
            <i class="fa-solid fa-play"></i>
        </button>

        <button class="control-sm" onclick="nextSong()">
            <i class="fa-solid fa-forward-step"></i>
        </button>

        <button id="modeBtn" class="control-sm" onclick="cyclePlayMode()" title="Badilisha aina ya kuplay">
            <i id="modeIcon" class="fa-solid fa-repeat"></i>
        </button>
    </div>

    <div class="quick-actions">
        <button onclick="importDeviceFiles()">
            <i class="fa-solid fa-folder-open"></i>Device
        </button>
        <button onclick="addCurrentToPlaylist()">
            <i class="fa-solid fa-bookmark"></i>Save
        </button>
        <button onclick="openYoutubeSearch()">
            <i class="fa-brands fa-youtube"></i>YouTube
        </button>
        <button onclick="toggleLyricsPopup()">
            <i class="fa-solid fa-closed-captioning"></i>CC
        </button>
    </div>
</section>

<section class="list-card">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <strong id="sourceTitle">YouTube Fixed</strong><br>
            <small class="text-white-50">Chagua music hapa chini</small>
        </div>

        <button class="icon-btn" data-bs-toggle="offcanvas" data-bs-target="#menuCanvas">
            <i class="fa-solid fa-list"></i>
        </button>
    </div>

    <div class="results" id="resultsBox"></div>
</section>

</main>
</div>

<div class="bottom-player" id="bottomPlayer">
    <button class="bottom-handle" onclick="toggleBottomPlayer()">
        <i id="bottomHandleIcon" class="fa-solid fa-chevron-down"></i>
    </button>

    <div class="bottom-inner">
        <div class="bottom-thumb" id="bottomThumb" onclick="expandBottomAndShowPlayer()">
            <i class="fa-solid fa-music"></i>
        </div>

        <div class="bottom-text" onclick="expandBottomAndShowPlayer()">
            <strong id="bottomTitle">No music selected</strong>
            <small id="bottomArtist">Playing info</small>
        </div>

        <button class="mini-round" onclick="togglePlay()">
            <i id="bottomPlayIcon" class="fa-solid fa-play"></i>
        </button>

        <button class="mini-round" data-bs-toggle="offcanvas" data-bs-target="#menuCanvas">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</div>

<div class="offcanvas offcanvas-start" tabindex="-1" id="menuCanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">
            <i class="fa-solid fa-music me-2"></i>Music Menu
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
        <button id="menuFixed" class="menu-source-btn active" onclick="setTab('fixed')">
            <i class="fa-brands fa-youtube"></i>
            <span>
                <strong>YouTube Fixed</strong><br>
                <small class="text-white-50">Videos ulizoweka tayari</small>
            </span>
        </button>

        <button id="menuLibrary" class="menu-source-btn" onclick="setTab('library')">
            <i class="fa-solid fa-folder-open"></i>
            <span>
                <strong>My Library</strong><br>
                <small class="text-white-50">Music kutoka device au URL</small>
            </span>
        </button>

        <button id="menuSearch" class="menu-source-btn" onclick="setTab('search')">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>
                <strong>Search Results</strong><br>
                <small class="text-white-50">Matokeo ya ulichosearch</small>
            </span>
        </button>

        <button id="menuPlaylist" class="menu-source-btn" onclick="setTab('playlist')">
            <i class="fa-solid fa-bookmark"></i>
            <span>
                <strong>Playlist</strong><br>
                <small class="text-white-50">Ulizozisave</small>
            </span>
        </button>

        <hr class="border-secondary">

        <div class="d-grid gap-2">
            <button class="btn btn-main" onclick="importDeviceFiles()">
                <i class="fa-solid fa-folder-open me-2"></i>Load From Device
            </button>

<script>
const fixedYoutube = [
    {

        title:'Fixed YouTube 1',
        artist:'YouTube',
        type:'youtube',
        youtubeId:'rJwEphsNVH8',
        image:'https://img.youtube.com/vi/rJwEphsNVH8/hqdefault.jpg',
        lyrics:''
    },
    {

        type:'youtube',

        image:'https://img.youtube.com/vi/CQLsdm1ZYAw/hqdefault.jpg',
        lyrics:''
    },
    {
        id:'yt3',
        title:'Fixed YouTube 3',
        artist:'YouTube',
        type:'youtube',
        youtubeId:'dNt1QR1ecuM',

        lyrics:''
    }
];

let library = JSON.parse(localStorage.getItem('shottoLibrary')) || [];
let playlist = JSON.parse(localStorage.getItem('shottoPlaylist')) || [];
let searchResults = [];
let currentTab = 'fixed';
let currentSong = null;

let playModes = ['all','one','shuffle'];
let playMode = localStorage.getItem('shottoPlayMode') || 'all';

let subtitleWords = [];
let subtitleIndex = 0;
let subtitleTimer = null;
let subtitleLineA = [];
let subtitleLineB = [];
let lyricsVisible = false;

const audio = document.getElementById('audioPlayer');
const video = document.getElementById('videoPlayer');
const youtubeFrame = document.getElementById('youtubeFrame');
const discArea = document.getElementById('discArea');
const disc = document.getElementById('disc');
const toneArm = document.getElementById('toneArm');
const waves = document.getElementById('waves');
const playBtn = document.getElementById('playBtn');
const bottomPlayIcon = document.getElementById('bottomPlayIcon');
const progressRange = document.getElementById('progressRange');

function saveLocal(){
    localStorage.setItem('shottoLibrary', JSON.stringify(library.filter(x => x.source !== 'device-temp')));
    localStorage.setItem('shottoPlaylist', JSON.stringify(playlist));
}

function escapeHtml(text){
    return String(text || '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
}

function cyclePlayMode(){
    let index = playModes.indexOf(playMode);
    index++;
    if(index >= playModes.length) index = 0;
    playMode = playModes[index];
    localStorage.setItem('shottoPlayMode', playMode);
    updateModeButton();
}

function updateModeButton(){
    const icon = document.getElementById('modeIcon');

    if(playMode === 'all'){
        icon.className = 'fa-solid fa-repeat';
        document.getElementById('modeBtn').title = 'Mfululizo';
    }else if(playMode === 'one'){
        icon.className = 'fa-solid fa-rotate-right';
        document.getElementById('modeBtn').title = 'Rudia moja';
    }else{
        icon.className = 'fa-solid fa-shuffle';
        document.getElementById('modeBtn').title = 'Shuffle';
    }
}

function toggleLyricsPopup(){
    lyricsVisible = !lyricsVisible;
    document.getElementById('lyricsPopup').classList.toggle('show', lyricsVisible);
    document.getElementById('ccBtn').classList.toggle('active', lyricsVisible);

    if(lyricsVisible && currentSong){
        if(subtitleWords.length === 0){
            prepareSubtitles(currentSong);
        }
        if(isCurrentlyPlaying()){
            startSubtitles();
        }else{
            renderSubtitles();
        }
    }else{
        stopSubtitles();
    }
}

function autoGenerateLyrics(song){
    const title = song?.title || 'this music';
    const artist = song?.artist || 'unknown artist';

    return `
${title}
${artist}
Feel the rhythm
Follow the beat
Play it slowly
Move with the sound
Let the music flow
Keep the vibe alive
Enjoy the melody
Feel the sound
Practice again
You are improving
    `.trim();
}

function getLyrics(song){
    if(!song) return 'Lyrics zitaonekana hapa';
    if(song.lyrics && song.lyrics.trim().length > 0) return song.lyrics.trim();
    return autoGenerateLyrics(song);
}

function prepareSubtitles(song){
    clearSubtitleTextOnly();
    const lyrics = getLyrics(song);
    subtitleWords = lyrics.replace(/\s+/g,' ').trim().split(' ');
    subtitleIndex = 0;
    subtitleLineA = [];
    subtitleLineB = [];
}

function startSubtitles(){
    if(!lyricsVisible) return;

    stopSubtitles();

    if(!currentSong) return;

    if(subtitleWords.length === 0){
        prepareSubtitles(currentSong);
    }

    subtitleTimer = setInterval(() => {
        if(subtitleIndex >= subtitleWords.length){
            subtitleIndex = 0;
            subtitleLineA = [];
            subtitleLineB = [];
        }

        const word = subtitleWords[subtitleIndex];
        subtitleIndex++;

        subtitleLineB.push(word);

        if(subtitleLineB.join(' ').length > 34){
            subtitleLineA = subtitleLineB.slice(0, -1);
            subtitleLineB = [word];
        }

        renderSubtitles();

    }, 520);
}

function stopSubtitles(){
    if(subtitleTimer){
        clearInterval(subtitleTimer);
        subtitleTimer = null;
    }
}

function clearSubtitleTextOnly(){
    stopSubtitles();
    subtitleWords = [];
    subtitleIndex = 0;
    subtitleLineA = [];
    subtitleLineB = [];
    document.getElementById('subtitleLine1').innerHTML = '';
    document.getElementById('subtitleLine2').innerHTML = 'Bonyeza CC kuonyesha au kuficha lyrics...';
}

function renderSubtitles(){
    document.getElementById('subtitleLine1').innerHTML =
        subtitleLineA.map(w => `<span class="subtitle-word">${escapeHtml(w)}</span>`).join(' ');

    document.getElementById('subtitleLine2').innerHTML =
        subtitleLineB.map(w => `<span class="subtitle-word">${escapeHtml(w)}</span>`).join(' ');
}

function setTab(tab){
    currentTab = tab;

    document.getElementById('menuFixed').classList.toggle('active', tab === 'fixed');
    document.getElementById('menuLibrary').classList.toggle('active', tab === 'library');
    document.getElementById('menuSearch').classList.toggle('active', tab === 'search');
    document.getElementById('menuPlaylist').classList.toggle('active', tab === 'playlist');

    const titles = {
        fixed:'YouTube Fixed',
        library:'My Library',
        search:'Search Results',
        playlist:'Playlist'
    };

    document.getElementById('sourceTitle').textContent = titles[tab] || 'Music';

    renderList();

    const canvas = bootstrap.Offcanvas.getInstance(document.getElementById('menuCanvas'));
    if(canvas) canvas.hide();
}

function getList(){
    if(currentTab === 'fixed') return fixedYoutube;
    if(currentTab === 'library') return library;
    if(currentTab === 'search') return searchResults;
    if(currentTab === 'playlist') return playlist.map(id => findSong(id)).filter(Boolean);
    return [];
}

function findSong(id){
    return [...fixedYoutube, ...library, ...searchResults].find(x => String(x.id) === String(id));
}

function itemHtml(song){
    return `
        <div class="item ${currentSong && currentSong.id === song.id ? 'active' : ''}" onclick="selectSong('${song.id}', true)">
            <div class="thumb">
                ${song.image ? `<img src="${song.image}" alt="">` : `<i class="fa-solid ${song.type === 'youtube' ? 'fa-youtube' : song.type === 'video' ? 'fa-video' : 'fa-music'}"></i>`}
            </div>

            <div class="meta">
                <strong>${escapeHtml(song.title)}</strong>
                <small>${escapeHtml(song.artist || 'Unknown')}</small>
                <small>${song.type.toUpperCase()}</small>
            </div>

            <button class="mini-round" onclick="event.stopPropagation(); openSongBio('${song.id}')">
                <i class="fa-solid fa-circle-info"></i>
            </button>
        </div>
    `;
}

function renderList(){
    const box = document.getElementById('resultsBox');
    const data = getList();

    if(!data.length){
        box.innerHTML = `<div class="empty">Hakuna item hapa kwa sasa.</div>`;
        return;
    }

    box.innerHTML = data.map(itemHtml).join('');
}

function renderTopSearchResults(){
    const box = document.getElementById('searchResultsTop');

    if(!searchResults.length){
        box.classList.remove('show');
        box.innerHTML = '';
        return;
    }

    box.classList.add('show');
    box.innerHTML = searchResults.slice(0,6).map(itemHtml).join('');
}

async function searchMusic(){
    const q = document.getElementById('searchInput').value.trim();

    if(!q){
        alert('Andika jina la music.');
        return;
    }

    const topBox = document.getElementById('searchResultsTop');
    topBox.classList.add('show');
    topBox.innerHTML = `<div class="empty">Searching...</div>`;

    try{
        const url = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=25`;
        const response = await fetch(url);
        const data = await response.json();

        searchResults = (data.results || []).map(item => ({
            id:'search_' + item.trackId,
            title:item.trackName,
            artist:item.artistName,
            type:'audio',
            url:item.previewUrl,
            image:item.artworkUrl100 ? item.artworkUrl100.replace('100x100','600x600') : '',
            lyrics:'',
            source:'search'
        }));

        if(searchResults.length === 0){
            topBox.innerHTML = `<div class="empty">Hakuna result iliyopatikana.</div>`;
        }else{
            renderTopSearchResults();
        }

        setTab('search');

    }catch(e){
        topBox.innerHTML = `<div class="empty">Search imeshindikana. Angalia internet.</div>`;
    }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
    if(e.key === 'Enter'){
        searchMusic();
    }
});

function selectSong(id, autoplay){
    const song = findSong(id);
    if(!song) return;

    currentSong = song;
    stopAll();

    document.getElementById('nowTitle').textContent = song.title;
    document.getElementById('nowArtist').textContent = song.artist || 'Unknown';
    document.getElementById('bottomTitle').textContent = song.title;
    document.getElementById('bottomArtist').textContent = song.artist || 'Unknown';

    document.getElementById('bottomThumb').innerHTML = song.image
        ? `<img src="${song.image}" alt="">`
        : `<i class="fa-solid ${song.type === 'youtube' ? 'fa-youtube' : song.type === 'video' ? 'fa-video' : 'fa-music'}"></i>`;

    prepareSubtitles(song);

    if(song.type === 'youtube'){
        showYoutube(song.youtubeId, autoplay);
    }else if(song.type === 'video'){
        showVideo(song.url, autoplay);
    }else{
        showAudio(song.url, autoplay);
    }

    document.getElementById('searchResultsTop').classList.remove('show');

    renderList();

    expandBottomPlayer();

    setTimeout(() => {
        document.getElementById('playerSection').scrollIntoView({
            behavior:'smooth',
            block:'start'
        });
    }, 100);
}

function showYoutube(videoId, autoplay){
    discArea.style.display = 'none';
    video.style.display = 'none';
    youtubeFrame.style.display = 'block';

    youtubeFrame.src = `https://www.youtube.com/embed/${videoId}${autoplay ? '?autoplay=1&rel=0' : '?rel=0'}`;

    setPlaying(true);
    startSubtitles();
}

function showVideo(url, autoplay){
    youtubeFrame.src = '';
    youtubeFrame.style.display = 'none';
    discArea.style.display = 'none';
    video.style.display = 'block';

    video.src = url;
    video.playbackRate = Number(document.getElementById('speedRange').value);
    video.volume = Number(document.getElementById('volumeRange').value);

    if(autoplay){
        video.play().then(startSubtitles).catch(()=>{});
    }
}

function showAudio(url, autoplay){
    youtubeFrame.src = '';
    youtubeFrame.style.display = 'none';
    video.style.display = 'none';
    discArea.style.display = 'grid';

    audio.src = url;
    audio.playbackRate = Number(document.getElementById('speedRange').value);
    audio.volume = Number(document.getElementById('volumeRange').value);

    if(autoplay){
        audio.play().then(startSubtitles).catch(()=>{});
    }
}

function stopAll(){
    audio.pause();
    video.pause();
    audio.removeAttribute('src');
    video.removeAttribute('src');
    youtubeFrame.src = '';
    progressRange.value = 0;
    document.getElementById('currentTime').textContent = '0:00';
    document.getElementById('durationTime').textContent = '0:00';
    stopSubtitles();
    setPlaying(false);
}

function togglePlay(){
    if(!currentSong){
        alert('Chagua music kwanza.');
        return;
    }

    if(currentSong.type === 'youtube'){
        startSubtitles();
        return;
    }

    const player = currentSong.type === 'video' ? video : audio;

    if(player.paused){
        player.play().then(startSubtitles).catch(()=>{});
    }else{
        player.pause();
        stopSubtitles();
    }

    updateUI();
}

function isCurrentlyPlaying(){
    if(!currentSong) return false;
    if(currentSong.type === 'audio') return !audio.paused && audio.src;
    if(currentSong.type === 'video') return !video.paused && video.src;
    if(currentSong.type === 'youtube') return true;
    return false;
}

function setPlaying(isPlaying){
    playBtn.innerHTML = isPlaying ? `<i class="fa-solid fa-pause"></i>` : `<i class="fa-solid fa-play"></i>`;
    bottomPlayIcon.className = isPlaying ? 'fa-solid fa-pause' : 'fa-solid fa-play';
    disc.classList.toggle('playing', isPlaying);
    toneArm.classList.toggle('playing', isPlaying);
    waves.classList.toggle('playing', isPlaying);
}

function updateUI(){
    setPlaying(isCurrentlyPlaying());
}

function getCurrentIndex(){
    const data = getList();
    return data.findIndex(x => currentSong && x.id === currentSong.id);
}

function getRandomIndex(data){
    if(data.length <= 1) return 0;

    let currentIndex = getCurrentIndex();
    let randomIndex = Math.floor(Math.random() * data.length);

    while(randomIndex === currentIndex){
        randomIndex = Math.floor(Math.random() * data.length);
    }

    return randomIndex;
}

function nextSong(){
    const data = getList();
    if(!data.length) return;

    if(playMode === 'one' && currentSong){
        selectSong(currentSong.id, true);
        return;
    }

    if(playMode === 'shuffle'){
        const randomIndex = getRandomIndex(data);
        selectSong(data[randomIndex].id, true);
        return;
    }

    let i = getCurrentIndex();
    i++;
    if(i >= data.length) i = 0;

    selectSong(data[i].id, true);
}

function prevSong(){
    const data = getList();
    if(!data.length) return;

    if(playMode === 'shuffle'){
        const randomIndex = getRandomIndex(data);
        selectSong(data[randomIndex].id, true);
        return;
    }

    let i = getCurrentIndex();
    i--;
    if(i < 0) i = data.length - 1;

    selectSong(data[i].id, true);
}

function formatTime(sec){
    if(!sec || isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2,'0');
    return `${m}:${s}`;
}

function updateProgress(player){
    if(!player.duration) return;

    progressRange.value = (player.currentTime / player.duration) * 100;
    document.getElementById('currentTime').textContent = formatTime(player.currentTime);
    document.getElementById('durationTime').textContent = formatTime(player.duration);
}

progressRange.addEventListener('input', () => {
    if(!currentSong || currentSong.type === 'youtube') return;

    const player = currentSong.type === 'video' ? video : audio;

    if(player.duration){
        player.currentTime = (progressRange.value / 100) * player.duration;
    }
});

audio.addEventListener('timeupdate', () => updateProgress(audio));
video.addEventListener('timeupdate', () => updateProgress(video));

audio.addEventListener('play', () => {
    updateUI();
    startSubtitles();
});

audio.addEventListener('pause', () => {
    updateUI();
    stopSubtitles();
});

video.addEventListener('play', () => {
    updateUI();
    startSubtitles();
});

video.addEventListener('pause', () => {
    updateUI();
    stopSubtitles();
});

audio.addEventListener('ended', () => {
    updateUI();
    stopSubtitles();
    nextSong();
});

video.addEventListener('ended', () => {
    updateUI();
    stopSubtitles();
    nextSong();
});

function importDeviceFiles(){
    document.getElementById('deviceFiles').click();
}

document.getElementById('deviceFiles').addEventListener('change', function(){
    const files = Array.from(this.files || []);

    files.forEach(file => {
        const isVideo = file.type.startsWith('video');

        library.unshift({
            id:'dev_' + Date.now() + '_' + Math.random().toString(16).slice(2),
            title:file.name.replace(/\.[^/.]+$/, ''),
            artist:'Device File',
            type:isVideo ? 'video' : 'audio',
            url:URL.createObjectURL(file),
            image:'',
            lyrics:'',
            source:'device-temp'
        });
    });

    setTab('library');

    if(library.length){
        selectSong(library[0].id, true);
    }
});

function extractYoutubeId(input){
    if(!input) return '';

    const text = input.trim();

    if(/^[a-zA-Z0-9_-]{11}$/.test(text)) return text;

    const patterns = [
        /v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /embed\/([a-zA-Z0-9_-]{11})/,
        /shorts\/([a-zA-Z0-9_-]{11})/
    ];

    for(const pattern of patterns){
        const match = text.match(pattern);
        if(match) return match[1];
    }

    return '';
}

function toggleType(){
    const type = document.getElementById('addType').value;
    document.getElementById('fileBox').classList.toggle('d-none', type === 'youtube');
    document.getElementById('youtubeBox').classList.toggle('d-none', type !== 'youtube');
}

function saveManual(){
    const title = document.getElementById('addTitle').value.trim();
    const artist = document.getElementById('addArtist').value.trim();
    const type = document.getElementById('addType').value;
    const file = document.getElementById('addFile').files[0];
    const url = document.getElementById('addUrl').value.trim();
    const yt = document.getElementById('addYoutube').value.trim();
    const img = document.getElementById('addImage').files[0];
    const lyrics = document.getElementById('addLyrics').value.trim();

    if(!title){
        alert('Weka title.');
        return;
    }

    let finalUrl = '';
    let youtubeId = '';
    let image = img ? URL.createObjectURL(img) : '';

    if(type === 'youtube'){
        youtubeId = extractYoutubeId(yt);

        if(!youtubeId){
            alert('YouTube link si sahihi.');
            return;
        }

        image = image || `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;
    }else{
        if(file) finalUrl = URL.createObjectURL(file);
        else if(url) finalUrl = url;
        else{
            alert('Chagua file au weka URL.');
            return;
        }
    }

    const item = {
        id:'manual_' + Date.now(),
        title,
        artist:artist || 'Unknown',
        type,
        url:finalUrl,
        youtubeId,
        image,
        lyrics,
        source:file || img ? 'device-temp' : 'manual'
    };

    library.unshift(item);
    saveLocal();

    const modal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
    if(modal) modal.hide();

    setTab('library');
    selectSong(item.id, true);
}

function addToPlaylist(id){
    if(!playlist.includes(id)){
        playlist.unshift(id);
        saveLocal();
        alert('Imeongezwa kwenye playlist.');
    }
}

function addCurrentToPlaylist(){
    if(!currentSong){
        alert('Chagua music kwanza.');
        return;
    }

    addToPlaylist(currentSong.id);
}

function openYoutubeSearch(){
    const q = document.getElementById('searchInput').value.trim() || 'music';
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(q), '_blank');
}

document.getElementById('speedRange').addEventListener('input', function(){
    const v = Number(this.value);
    audio.playbackRate = v;
    video.playbackRate = v;
    document.getElementById('speedText').textContent = v.toFixed(2) + 'x';
});

document.getElementById('volumeRange').addEventListener('input', function(){
    const v = Number(this.value);
    audio.volume = v;
    video.volume = v;
    document.getElementById('volumeText').textContent = Math.round(v * 100) + '%';
});

function applyPreset(){
    const preset = document.getElementById('presetSelect').value;

    let speed = 1;
    let volume = 1;

    if(preset === 'rock'){
        speed = 1.03;
        volume = 1;
    }else if(preset === 'heavy'){
        speed = 1.05;
        volume = 1;
    }else if(preset === 'pop'){
        speed = 1;
        volume = .95;
    }else if(preset === 'bass'){
        speed = 1;
        volume = 1;
    }

    document.getElementById('speedRange').value = speed;
    document.getElementById('volumeRange').value = volume;

    audio.playbackRate = speed;
    video.playbackRate = speed;
    audio.volume = volume;
    video.volume = volume;

    document.getElementById('speedText').textContent = speed.toFixed(2) + 'x';
    document.getElementById('volumeText').textContent = Math.round(volume * 100) + '%';
}

function openSongBio(id){
    const song = findSong(id);
    if(!song) return;

    document.getElementById('bioTitle').textContent = song.title;
    document.getElementById('bioArtist').textContent = song.artist || 'Unknown';
    document.getElementById('bioType').textContent = song.type.toUpperCase();

    document.getElementById('bioImage').innerHTML = song.image
        ? `<img src="${song.image}" style="width:100%;height:100%;object-fit:cover;">`
        : `<i class="fa-solid fa-music"></i>`;

    new bootstrap.Modal(document.getElementById('songBioModal')).show();
}

function collapseBottomPlayer(){
    document.getElementById('bottomPlayer').classList.add('hidden-mini');
    document.getElementById('bottomHandleIcon').className = 'fa-solid fa-chevron-up';
}

function expandBottomPlayer(){
    document.getElementById('bottomPlayer').classList.remove('hidden-mini');
    document.getElementById('bottomHandleIcon').className = 'fa-solid fa-chevron-down';
}

function toggleBottomPlayer(){
    const bp = document.getElementById('bottomPlayer');
    if(bp.classList.contains('hidden-mini')){
        expandBottomPlayer();
    }else{
        collapseBottomPlayer();
    }
}

function expandBottomAndShowPlayer(){
    expandBottomPlayer();
    setTimeout(() => {
        document.getElementById('playerSection').scrollIntoView({
            behavior:'smooth',
            block:'start'
        });
    }, 80);
}

renderList();
toggleType();
applyPreset();
updateModeButton();
</script>

</body>
</html>
